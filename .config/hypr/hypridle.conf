# hypridle.conf - User idle management for Hyprland
#
# Strategy: lock screen after 10min, blank DPMS after 15min.
# NO suspend listener - system never sleeps (per server reliability requirements).
# Sleep/suspend is masked at the systemd level via cmd/50-reliability/no-sleep.sh.

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# Lock screen after 10 minutes of inactivity
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# Blank displays after 15 minutes of inactivity (DPMS off)
listener {
    timeout = 900
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# NOTE: No suspend listener - this box is configured as always-on server.
# System sleep/suspend is masked via systemctl mask (see cmd/50-reliability/no-sleep.sh).
