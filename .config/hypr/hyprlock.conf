# hyprlock.conf - Minimal lock screen for Hyprland
#
# Solid color background, single input field with username display.
# No external image dependencies (avoids breakage if wallpaper path changes).

general {
    hide_cursor = true
    grace = 0
    disable_loading_bar = false
    no_fade_in = false
    ignore_empty_input = true
}

background {
    monitor =
    color = rgba(15, 15, 20, 1.0)
    blur_passes = 0
    blur_size = 0
}

# Username label
label {
    monitor =
    text = $USER
    color = rgba(232, 184, 90, 1.0)
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 0, 160
    halign = center
    valign = center
}

# Clock label
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(232, 184, 90, 1.0)
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.45
    dots_center = true
    outer_color = rgba(212, 162, 76, 1.0)
    inner_color = rgba(21, 21, 31, 1.0)
    font_color = rgba(255, 255, 255, 1.0)
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    hide_input = false
    check_color = rgba(255, 107, 61, 1.0)
    fail_color = rgba(255, 0, 0, 1.0)
    position = 0, -50
    halign = center
    valign = center
}
