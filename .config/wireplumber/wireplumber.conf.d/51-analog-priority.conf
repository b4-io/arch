# Make the motherboard analog audio output behave correctly:
#
#   1. Enable ACP auto-port on the Realtek ALC1220 device so the active
#      port follows jack availability. Wireplumber hardcodes
#      `api.acp.auto-port = false` in scripts/monitors/alsa.lua, which
#      means the highest-priority port is picked once at startup and
#      never re-evaluated. With auto-port enabled, the kernel's jack
#      detection drives port selection, so plugging into the rear green
#      jack (Line Out) makes Line Out the active port even though the
#      front-panel Headphones port has a higher static priority (9900
#      vs 9000) but is "not available" because the front-panel jack
#      detect on this codec doesn't fire reliably.
#
#   2. Heavily prioritize the analog sink so it wins over HDMI as the
#      default audio sink. Without this, wireplumber sometimes picks
#      the GPU's HDMI audio output as the runtime default at session
#      start (even though the configured default is analog), and
#      audio gets routed to a monitor that has no speakers.
#
#   3. De-prioritize the HDMI audio sink so it's never picked as the
#      default. It's still available - users can still manually select
#      it in pavucontrol if they ever want HDMI audio.
#
# Hardware-specific: matches the AMD Family 17h HD Audio Controller
# at PCI 0e:00.3 and the Vega 10 HDMI Audio at PCI 0c:00.1.

monitor.alsa.rules = [
  # 1. Auto-port on the motherboard analog audio device
  {
    matches = [
      { device.name = "alsa_card.pci-0000_0e_00.3" }
    ]
    actions = {
      update-props = {
        api.acp.auto-port = true
      }
    }
  }

  # 2. Make the analog sink the strongly preferred default
  {
    matches = [
      { node.name = "alsa_output.pci-0000_0e_00.3.analog-stereo" }
    ]
    actions = {
      update-props = {
        priority.driver  = 5000
        priority.session = 5000
      }
    }
  }

  # 3. Demote the GPU HDMI audio sink so it's never the default
  {
    matches = [
      { node.name = "~alsa_output.pci-0000_0c_00.1\\..*" }
    ]
    actions = {
      update-props = {
        priority.driver  = 100
        priority.session = 100
      }
    }
  }
]
